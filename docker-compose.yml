services:
  postgres:
    image: postgres:17-alpine
    container_name: repopilot-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repopilot

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: repopilot-backend
    restart: unless-stopped

    depends_on:
      - postgres

    env_file:
      - .env

    ports:
      - "3000:3000"

    volumes:
      - ./Review Project:/app/Review Project   

volumes:
  postgres_data: